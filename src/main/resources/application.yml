spring:
  application:
    name: favs-list
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/favs_list_db}
    username: ${DB_USERNAME:favs_list_app_user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  graphql:
    schema:
      introspection:
        enabled: ${GRAPHQL_INTROSPECTION_ENABLED:false}
    graphiql:
      enabled: ${GRAPHQL_PLAYGROUND_ENABLED:false}

app:
  auth:
    jwt:
      issuer: ${JWT_ISSUER:favs-list-api}
      audience: ${JWT_AUDIENCE:favs-list-client}
      access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:900}
      secret: ${JWT_SECRET:}
      private-key: ${JWT_PRIVATE_KEY:}
    password:
      algorithm: ${PASSWORD_HASH_ALGORITHM:argon2id}
    rate-limit:
      login-per-minute: ${LOGIN_RATE_LIMIT_PER_MINUTE:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  graphql:
    security:
      max-query-depth: ${GRAPHQL_MAX_QUERY_DEPTH:8}
      max-query-complexity: ${GRAPHQL_MAX_QUERY_COMPLEXITY:100}
      max-request-body-bytes: ${GRAPHQL_MAX_REQUEST_BODY_BYTES:1048576}
      allow-batch-requests: ${GRAPHQL_BATCH_REQUESTS_ENABLED:false}
